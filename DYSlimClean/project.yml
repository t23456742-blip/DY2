name: DYSlimClean
options:
  bundleIdPrefix: com.dyslim
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    SWIFT_VERSION: "5.0"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.dyslim.cleaner
    MARKETING_VERSION: "13.0"
    CURRENT_PROJECT_VERSION: "130"
    GENERATE_INFOPLIST_FILE: "NO"
    INFOPLIST_FILE: DYSlimClean/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: DYSlimClean/Resources/DYSlimClean.entitlements
    SUPPORTS_MACCATALYST: "NO"
    ENABLE_BITCODE: "NO"
    OTHER_LDFLAGS: "$(inherited) -lsqlite3 -lz"
targets:
  DYSlimClean:
    type: application
    platform: iOS
    sources:
      - path: DYSlimClean
        excludes:
          - Resources/**
      - path: DYSlimClean/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - DYSlimClean.entitlements
    settings:
      base:
        PRODUCT_NAME: DYSlimClean
        PRODUCT_BUNDLE_IDENTIFIER: com.dyslim.cleaner
        MARKETING_VERSION: "13.0"
        CURRENT_PROJECT_VERSION: "130"
        INFOPLIST_FILE: DYSlimClean/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: DYSlimClean/Resources/DYSlimClean.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: DYSlimClean/Resources/Info.plist
      properties:
        CFBundleDisplayName: DY助手
        CFBundleName: DY助手
        CFBundleShortVersionString: "13.0"
        CFBundleVersion: "130"
        CFBundleDevelopmentRegion: zh-Hans
        CFBundleLocalizations:
          - zh-Hans
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        MinimumOSVersion: "15.0"
schemes:
  DYSlimClean:
    build:
      targets:
        DYSlimClean: all
    run:
      config: Debug
    archive:
      config: Release
