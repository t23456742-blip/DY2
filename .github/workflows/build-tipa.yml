name: Build TIPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"


      - name: Show Xcode
        run: xcodebuild -version

      - name: Install tools
        run: |
          brew install ldid xcodegen
          xcodegen --version

      - name: Generate Xcode project
        working-directory: DYSlimClean
        run: |
          pwd
          ls -la
          test -f project.yml
          xcodegen generate
          head -n 5 DYSlimClean.xcodeproj/project.pbxproj

      - name: Build (unsigned)
        working-directory: DYSlimClean
        run: |
          xcodebuild \
            -project DYSlimClean.xcodeproj \
            -scheme DYSlimClean \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package tipa
        working-directory: DYSlimClean
        run: |
          chmod +x scripts/package-tipa.sh
          bash scripts/package-tipa.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DYSlimClean-tipa
          path: |
            DYSlimClean/dist/*.tipa
            DYSlimClean/dist/*.ipa
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DYSlimClean/dist/*.tipa
            DYSlimClean/dist/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
