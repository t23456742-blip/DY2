name: Build TIPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications | grep -i Xcode || true
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install tools
        run: |
          brew install ldid xcodegen
          ldid 2>&1 | head -n 2 || true
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project DYSlimClean.xcodeproj \
            -scheme DYSlimClean \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build | xcpretty || xcodebuild \
            -project DYSlimClean.xcodeproj \
            -scheme DYSlimClean \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package tipa
        run: |
          chmod +x scripts/package-tipa.sh
          bash scripts/package-tipa.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DYSlimClean-tipa
          path: |
            dist/*.tipa
            dist/*.ipa
          if-no-files-found: error

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tipa
            dist/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
